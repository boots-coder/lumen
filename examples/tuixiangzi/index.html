<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>推箱子游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>推箱子游戏</h1>
    <div id="game"></div>
    <div id="controls" style="margin:12px 0;">
      <button onclick="prevLevel()">上一关</button>
      <button onclick="nextLevel()">下一关</button>
      <button onclick="resetGame()">重置关卡</button>
    </div>
    <p>操作说明：使用方向键 ↑ ↓ ← → 控制角色</p>
    <script src="main.js"></script>
</body>
</html>
